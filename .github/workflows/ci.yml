name: Flutter CI/CD

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build APK
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release

      - name: Get the version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "release_version=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Move APK
        if: startsWith(github.ref, 'refs/tags/')
        run: mv build/app/outputs/apk/release/app-release.apk build/app/outputs/apk/release/worktrack_v${{ env.release_version }}.apk

      - name: Generate version.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cat << EOF > version.json
          {
            "version": "${{ env.release_version }}",
            "download_url": "https://github.com/lexusletz/WorkTrack/releases/latest/download/worktrack_v${{ env.release_version }}.apk"
          }
          EOF

      - name: Commit changes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name 'Github Action'
          git config user.email 'action@github.com'
          git add .
          git commit -m "Update version.json for new release" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/apk/release/worktrack_v${{ env.release_version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}